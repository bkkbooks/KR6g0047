body:
  text: 唐太宗文皇帝施行遺教經勑勅旨法者如來滅後以末代澆浮付囑國王大臣護持佛法然僧尼出家戒行須備若縱情淫佚觸塗煩惱關涉人間動違經律既失如來玄妙之旨又虧國王受付之義遺教經是佛臨涅槃所說誡勒弟子甚為詳要末俗緇素並不崇奉大道將隱微言且絕永懷聖教用思弘闡宜令所司差書手十人多寫經本務盡施行所須紙筆墨等有司準給其官宦五品已上及諸州刺史各付一卷若見僧尼行業與經文不同宜公私勸勉必使遵行出文館辭林第六百九十三卷宋真宗皇帝刊遺教經夫道非遠人教本無類雖蠢動之形各異而常樂之性斯同由愛欲之紛綸致輪迴之增長是以迦維之聖出世而流慈舍衛之區隨機而演法既含靈而悉度將順俗以歸真猶於雙樹之間普告大乘之眾示五根之可戒問四諦之所疑期法奧之宣揚俾眾心而堅固大悲之念斯謂至乎朕祇嗣慶基顧慚涼德常遵先訓庶導祕詮因覽斯經每懷欽奉冀流通而有益仍俾鏤於方板所期貽厥庶凡在羣倫勉同歸向云爾重刊遺教經註解序夫淨法界中本無出沒大悲願力示現受生無說中而示說無形處而現形故有四十九年露布三百餘會葛藤大槩而論不出於三一曰經藏詮於定故玄寂不動塵塵而淨國純真靈鑑隨緣念念而佛身普應二曰律藏詮於戒故擬心萌念條條而早犯尸羅絕慮忘思段段而皆成規範三曰論藏詮於慧故明明不昧而森羅星象燦然湛湛虗澄而鱗甲羽毛弗暗雖有三名曾無三體故考繩墨而立定門即貫華而開律部據優波提舍而為其論即一而三即三而一三一互融名祕密藏也今茲遺教經四十年已後而演也雖曰脩多羅其實重示戒律世尊見諸弟子尸羅將傾告諸眾等於我滅後當珍敬波羅提木叉是汝大師若我住世無異此也當知戒是正順解脫之本禪定智慧由此而生是我佛最後垂範也茲有奉佛弟子古鑑清明傳講之時見其註略并字之昏小不無三豕之訛請余勾科補註校正流通於世余緇素不分焉敢校補也公再懇之不得已而應命稍述其科文略補其缺漏聊正其訛脫及記其歲月云爾時萬歷丙戌仲春吉日欽依皇壇傳講紫衣沙門特賜金佛寶冠永祥禪師古靈了童述
