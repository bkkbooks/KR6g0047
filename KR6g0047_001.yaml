body:
  text: 明欽依皇壇傳講紫衣沙門特賜金佛寶冠永祥禪師古靈了童補註將釋此經疏科文分四初釋經題目佛遺教經此一題之中有人有法有能有所人法雙題能所合目故曰佛遺教經此是總標向下別釋佛者梵語佛陀此云覺者謂自覺覺他覺行圓滿故為佛也遺者我大世尊四十九年說法對病根而施與良藥遺留後代化利人天故曰遺也教者一大藏教即經律論三藏也經者梵語脩多羅此云契經謂契理合機之經也是故佛即人也遺教即法也經之一字能詮之文上三字所詮之義是以人法雙題能所合目故曰佛遺教經一名佛入涅槃略說教誡經謂佛為能入涅槃為所入涅槃者涅而不生槃而不滅不生不滅真常之極果也略說者對廣說略也教誡者我大世尊婆心太切諄諄而教誡也二譯經人時姚秦三藏法師鳩摩羅什奉詔譯姚秦即東晉王也姓姚名興為秦國王也三藏者此老師學通三藏徹究五乘道振華夷聲聞朝野故稱此號法師者廣博多聞能持一切言辭章句決定善知世出世間諸法生滅之相得禪定智慧於諸經法隨順無諍不增不損如所說行故曰法師又法師者以正法施於天上人間普徧微塵剎海故曰法師梵語鳩摩羅什此云童壽謂童年而有耆德也奉秦王詔翻譯此經也翻梵成華曰譯三註述名號宋鄖郊鳳山蘭若嗣祖沙門守遂註鄖郊者即湖廣鄖陽府是也鳳山者就形得名此山似鳳又即山名也蘭若者即梵語此云寂靜處嗣祖者言其老師紹續佛祖之位也沙門者即梵語此云勤息勤修戒定慧息滅貪瞋癡故號為沙門上守下遂是老師之名註者言邊有主曰註又分文析義曰註也四釋經本文三初序分三初序始度釋迦牟尼佛梵語此云能仁寂默謂能仁者視四生如一子悲含同體之心觀三界亦同仁慈啟無緣之化寂默者謂其體也寂默無為其用也靈明不昧故曰釋迦牟尼佛者十號中之一號也初轉法輪即三轉四諦法輪也三轉者謂示相轉此是苦逼迫性此是集招感性此是滅可證性此是道可修性勸修轉此是苦汝應知此是集汝應斷此是滅汝應證此是道汝應修作證轉此是苦我已知此是集我已斷此是滅我已證此是道我已修度阿若憍陳如此有五人父族三人一阿濕婆二䟦提三摩訶男母族二人一憍陳如二十力迦葉共五人也阿若名也此云無知非無所知乃是知無耳憍陳如姓此云火器其先祖事火從此命族也二序終度最後說法度須䟦陀羅我大世尊說法四十九年將收玄唱最後垂範也須䟦陀羅梵語此云好賢唐言善賢泥洹經云須䟦陀羅聰明多智誦四毗陀經一切書論無不通達為一切人之所崇敬聞佛涅槃方往佛所聞八聖道心意開解遂得初果從佛出家也所應度者皆已度訖言所應度者亦有不應度者何以故謂四眾人等因緣已熟一聞其法即證其果皆已度訖而城東老母等與佛同生一處佛不能化其為善也三示滅發起於娑羅雙樹間將入涅槃此樹有四雙八隻四榮四枯謂四榮表常樂我淨四枯表苦空無我無常也世尊入滅之時八樹皆變為白亦名為鶴林也將入涅槃者將者且然未畢之時將滅度而未滅度也是時中夜寂然無聲為諸弟子略說法要謂中夜表中道妙理寂然不動無聲無色不妨感而遂通出世度生無緣不應滅與不滅皆方便焉示滅化儀佛佛皆爾叮嚀付囑表悲願之不窮在昔如來四十九年三百餘會始從鹿野苑終至䟦提河一大事因緣已畢於此略說法要為後人之紀綱耳已上序分竟二正宗分十九初重演戒法四初重戒如師汝等比丘於我滅後當尊重珍敬波羅提木叉宋云別解脫身口七支各別防非即具足戒也如闇遇明貧人得寶當知此則是汝等大師若我住世無異此也重戒如佛佛常在焉二因戒邪命持淨戒者不得販賣貿易安置田宅畜養人民奴婢畜生一切種植及諸財寶皆當遠離如避火坑營求世利業火加薪志存無為戒珠絕類不得斬伐草木墾土掘地合和湯藥占相吉凶仰觀星宿推步盈虗即是推算步量天地之盈虗故曰推步盈虗又云推步即俯察地理盈虗即仰觀天文也歷數算計皆所不應節身時食清淨自活草繫鵝珠棄命守戒草繫者有一比丘被賊劫財縛於草上數日不敢動恐害其青草故曰草繫鵝珠者有一僧化飯至一施主家其家有一金珠僧見被鵝吞珠入腹施主尋珠不見只見一僧定是這僧偷了打罵不堪忽報鵝死矣僧曰且止休打我見金珠被鵝食了可以取之主曰何不早說僧曰恐害其命故不敢說今既死矣方纔說耳古既如是今何不然術數休咎邪命之習非清淨也不得參預世事通致使命呪術仙藥結好貴人親厚媟嫚皆不應作媟音泄嫚音慢通使呪藥背涅槃道結貴親嫚順生死流當自端心正念求度端心正念彼岸非遙不得包藏瑕疵顯異惑眾內不隱覆小失發露自新外不顯衒非真濫膺恭敬於四供養知量知足衣服臥具身外無餘飲食醫藥乞求知足趣得供事不應畜積長餘不積旅泊無累三略說戒本此則略說持戒之相戒是正順解脫之本故名波羅提木叉結略戒相持者正順解脫犯者正順煩惱開遮持犯具諸律部大聖略囑務要遵行四戒生定慧依因此戒得生諸禪定及滅苦智慧是故比丘當持淨戒勿令毀缺若人能持淨戒是則能有善法若無淨戒諸善功德皆不得生是以當知戒為第一安隱功德住處因戒生定因定生慧一代時教唯此三法無不該盡眾生無始無明業惑重障以此三法圓具則應念消落一切善法功德應念於此建立者也二慎護根門三初結前啟後汝等比丘已能住戒當制五根勿令放逸入於五欲二法喻並明譬如牧牛之人執杖視之不令縱逸犯人苗稼若縱五根非唯五欲將無涯畔不可制也前是因事立戒防非止惡今明慎護根門常須管帶如馬祖問石鞏云汝作何務鞏云牧牛祖云如何牧鞏云鼻索常在手一迴落草去把鼻拽將來祖云如是如是亦如惡馬不以轡制將當牽人墜於坑陷轡音馬韁也意馬難調戒為轡勒如被劫害苦止一世五根賊禍殃及累世為害甚重不可不慎人命世財苦唯現世慧命法財貧苦永劫輕重霄壤得不慎耶是故智者制而不隨持之如賊不令縱逸持心正觀根境本空物我皆如攀緣何起假令縱之皆亦不久見其磨滅妄情不真須臾變滅此五根者心為其主是故汝等當好制心五根虗妄妄識為宰欲制妄宰止觀雙行心之可畏甚於毒蛇惡獸怨賊大火越逸未足喻也世間毒惡未可喻者蓋能害法身慧命故也譬如有人手執蜜器動轉輕躁但觀於蜜不見深坑妄心妄境味著彌堅地獄深坑躁動不覺又如狂象無鉤猿猴得樹騰躍踔躑難可禁制當急挫之無令放逸狂象心猿戒為鉤鎖縱此心者喪人善事制之一處無事不辦一念不生諸緣頓息三總結勤伏是故比丘當勤精進折伏汝心知心本空當勤折伏了境常寂精進無疲三受食勿增四初正食汝等比丘受諸飲食當如服藥於好於惡勿生增減趣得支身以除飢渴藥因治病食以充飢好不生貪惡不生恚但支身行道而已復何增減乎二喻明如蜂採花但取其味不損色香蜂雖採花花亦結果三法合比丘亦爾受人供養趣自除惱無得多求壞其善心多求則令他生惱生惱則善心退沒四喻結譬如智者籌量牛力所堪多少不令過分以竭其力忖己德行而籌量防心離過而無竭四習善勿失三初晝夜習汝等比丘晝則勤心修習善法無令失時初夜後夜亦勿有廢中夜誦經以自消息晝三時夜三時似海之潮應不失時初後夜表二邊中夜分表中道三觀相續如雞抱卵那分晝夜二戒睡眠無以睡眠因緣令一生空過無所得也當念無常之火燒諸世間早求自度勿睡眠也諸煩惱賊常伺殺人甚於怨家安可睡眠不自警寤煩惱毒蛇睡在汝心譬如黑蚖在汝室睡當以持戒之鉤早併除之睡蛇既出乃可安眠不出而眠是無慚人蓋覆真性增長無明由睡眠之過患是無慚愧也昔者阿那律陀是佛堂弟白飯王之子出家之後多樂睡眠如來呵云咄咄胡為寐螺螄蚌蛤類一睡一千年不聞佛名字既聞佛呵涕泣自責七日不眠遂失雙目佛令修樂見照明金剛三昧乃得天眼故知先佛嚴戒委曲重宣苦口垂慈誠不可忽三結慚愧慚恥之服於諸莊嚴最為第一慚如鐵鉤能制人非法是故比丘常當慚恥無得暫替若離慚恥則失諸功德有愧之人則有善法若無愧者與諸禽獸無相異也六道之中可以整心慮趣菩提唯人道為能耳人而不為是謂無慚愧也慚愧若具足法身之衣服豈可無慚無愧樂著睡眠不進道乎慚者內自悔責愧者發露自新豈不美哉五忍行超戒三初忍害勿瞋汝等比丘若有人來節節支解經云佛言我於五百世作忍辱仙人被歌利王割截身體節節支解時若有我相人相眾生相壽者相應生瞋恨爾時無我相無人相無眾生相無壽者相不生瞋恨當自攝心無令瞋恨亦當護口勿出惡言若縱恚心則自妨道失功德利忍之為德持戒苦行所不能及能行忍者乃可名為有力大人若其不能歡喜忍受惡罵之毒如飲甘露者不名入道智慧人也智慧明則彼己不二彼己不二則美惡齊止美惡齊止則怨親等觀怨親等觀則苦樂無寄傅大士云忍心如幻夢辱境若龜毛常能作此觀逢難轉堅牢誠哉是言也二徵釋防護所以者何瞋恚之害則破諸善法壞好名聞今世後世人不喜見當知瞋心甚於猛火常當防護勿令得入劫功德賊無過瞋恚白衣受欲非行道人無法自制瞋猶可恕出家行道無欲之人而懷瞋恚甚不可也廣明瞋之患害如此皆因我見執著迷不知返故也一念瞋心起百萬障門開為煩惱之根是三塗之火俗諦可恕出世佛子可不慎歟可不慎歟三舉喻雙結譬如清冷雲中霹𮦷起火非所應也持戒如冰霜潔白而無染瞋火如霹𮦷何得而清涼所謂水火不同器寒暑不同時也六正命乞食二初執鉢順儀汝等比丘當自摩頭以捨飾好著壞色衣執持應器以乞自活壞衣持鉢順佛律儀乞食資身是為正命二伏憍入理自見如是若起憍慢當疾滅之增長憍慢尚非世俗白衣所宜何況出家入道之人為解脫故自降其身而行乞耶折伏憍慢入如來家謙下身心順解脫理七直心行道二初曲直並明汝等比丘諂曲之心與道相違是故宜應質直其心當知諂曲但為欺誑入道之人則無是處二結正為本是故汝等宜應端心以質直為本諂曲多欺詐直心是道場八少欲成功二初多少並明汝等比丘當知多欲之人多求利故苦惱亦多少欲之人無求無欲則無此患有求皆苦無欲何憂二少欲利益直爾少欲尚應修習何況少欲能生諸功德少欲之人則無諂曲以求人意亦復不為諸根所牽行少欲者心則坦然無所憂畏觸事有餘常無不足有少欲者則有涅槃是名少欲少欲一法功德如此直修少欲別無功德尚可修習況與解脫涅槃相應乎九知足清樂二初脫苦獲安汝等比丘若欲脫諸苦惱當觀知足知足之法即是富樂安隱之處二足不足互明知足之人雖臥地上猶為安樂不知足者雖處天堂亦不稱意不知足者雖富而貧知足之人雖貧而富不知足者常為五欲所牽為知足者之所憐愍是名知足知足則心絕希冀清樂有餘不知足者貪愛轉增苦輪難息十寂靜離眾三初靜處天欽汝等比丘欲求寂靜無為安樂當離憒閙獨處閒居憒古對切閙奴孝切心境靜寂孤然乃則靜處之人帝釋諸天所共敬重如善現尊者宴坐巖間釋天雨華之類事迹非一二法喻並明是故當捨己眾他眾自他徒眾皆捨空閒獨處思滅苦本安住涅槃若樂眾者則受眾惱譬如大樹眾鳥集之則有枯折之患世間縛著沒於眾苦眾者事理有二義事則憒閙也理者已謂五蘊為眾他謂一切煩惱為眾迷執五蘊聚集煩惱沒於生死故當遠離身心見也永嘉云若見山忘道則森羅眩目音聲聒耳雖山林獨處何由靜也若見道忘山則城隍閙市心境翛然萬法本閒而人自閙回光返照觸處皆渠無一法可當情亦無一法可容情者得無所離即除諸幻耳三單喻總結譬如老象溺泥不能自出是名遠離樂眾心為累遠離行當修十一勤行不懈二初勤行法喻汝等比丘若勤精進則事無難者勤行精進佛果可期是故汝等當勤精進譬如小水常流則能穿石二懈廢法喻若行者之心數數懈廢譬如鑽火未熱而息雖欲得火火難可得是名精進木中火性是火正因若不加功藉緣火終難得若加功不已如水性柔弱亦有穿石之期比況勤懈之得失如此宜勉勵焉十二正念遣魔三初正念去賊汝等比丘求善知識求善護助無如不忘念無忘之念資正定故夫煩惱出於妄情觀察法理以遣之初觀之時見理未明心不住理要須念力然後得觀念以不忘為用正心念法審其善惡善者增而不滅惡者滅而不生若有不忘念者諸煩惱賊則不能入正念不忘煩惱不生二誡勉勿失是故汝等常當攝念在心若失念者則失諸功德若念力堅強雖入五欲賊中不為所害內若不動外不能亂三以喻結正譬如著鎧入陣則無所畏是名不忘念正念常存魔軍克殄十三攝心知幻三初定心知滅汝等比丘若攝心者心則在定心在定故能知世間生滅法相定水澄淳森羅影現二誡行不散是故比丘常當精進修習諸定隨機淺深大小諸定皆當修習若得定者心則不散散心漸止隨順定門三法喻雙結譬如惜水之家善治隄塘行者亦爾為智慧水故善修禪定令不漏失是名為定若無定力乾慧不免苦輪定能資慧故古云菩薩清凉月常遊畢竟空眾生心水淨菩提影現中若水濁器破則月影不現耳十四智慧除惱四初去貪解脫汝等比丘若有智慧則無貪著常自省察不令有失智為前導不可暫闕是則於我法中能得解脫無慧名縛有慧名解二二名俱失若不爾者既非道人又非白衣無所名也心與形乖二名俱失三智之利益實智慧者則是度老病死海堅牢船也般若實智能度苦海亦是無明黑暗大明燈也無明大夜智燈能照一切病者之良藥也三毒重病智慧能治伐煩惱樹之利斧也煩惱根株智刃能伐是故汝等當以聞思修慧而自增益從聞思修漸次增益入三摩地四總結成慧若人有智慧之照雖是肉眼而是明見人也是為智慧肉眼廓照無明永滅智慧之力也故名明見之人十五戲論妨道二初標汝等比丘若種種戲論其心則亂雖復出家猶未得脫語默動靜乖於軌則能令心亂違解脫理二結是故比丘當急捨離亂心戲論若汝欲得寂滅樂者唯當善滅戲論之患是名不戲論若滅戲論虗妄分別涅槃之樂可庶幾乎十六端心去逸三初誡離怨汝等比丘於諸功德常當一心捨諸放逸放蕩狂逸如離怨賊大悲世尊所說利益皆已究竟二誡勤行汝等但當勤而行之大悲方便分別說三究竟涅槃唯一乘道若於山間若空澤中若在樹下閒處靜室念所受法隨力所受思惟修習勿令忘失常當自勉精進修之勉勵精進防退失焉無為空死後致有悔生死流浪後悔何益三二喻結我如良醫知病說藥服與不服非醫咎也佛說法藥治煩惱病聞不信服非佛咎也又如善導導人善道聞之不行非導過也佛為大導師引導眾生令至涅槃正道不信不行是誰之過歟十七誡疑重問汝等若於苦等四諦有所疑者可疾問之無得懷疑不求決也四諦法中有疑未決我當決之爾時世尊如是三唱人無問者眾默不問所以者何徵也眾無疑故釋不問之意十八替對伸演三初四諦無變時阿㝹樓駄觀察眾心㝹奴候切即阿那律陀梵音小異宋云無滅以天眼觀察眾意而白佛言世尊月可令熱日可令冷佛說四諦不可令異水火之性可令無定佛語真實決定不虗佛說苦諦實苦不可令樂苦是世俗果諦當審實決定無樂集真是因更無異因集是世俗因集諸不善業也決定是招苦之因苦若滅者即是因滅諸苦所因貪欲為本若滅貪欲無所依止因滅故果滅滅苦之道實是真道更無餘道滅諦出世真果即涅槃也道諦即斷煩惱出世真因無別道也世尊是諸比丘於四諦中決定無疑二三根不等於此眾中若所作未辦者見佛滅度當有悲感未證無生忍不了法身常住爾若有初入法者聞佛所說即皆得度親聞佛誨無不蒙益譬如夜見電光即得見道暫得心開未能究竟若所作已辦已度苦海者但作是念世尊滅度一何疾哉自雖已度愍未度故作念興歎三經家序結阿㝹樓駄雖說此語眾中皆悉了達四聖諦義世尊欲令此諸大眾皆得堅固以大悲心復為眾說未徹未辦聞佛滅度或生退沒末後慇懃委曲慰喻十九誡勉勿悲二初生畢有滅汝等比丘勿懷悲惱若我住世一劫會亦當滅會而不離終不可得緣起之法固不可留二二利俱備自利利人法皆具足積萬行成萬德演教海利羣機兼濟之道悉具備矣若我久住更無所益佛久住則眾生不起難遭想不種善根貪著五慾不求出苦故佛示滅耳應可度者若天上人間皆悉已度成道四十九載應度度畢無餘其未度者皆亦已作得度因緣清淨法眼戒定慧藏內則付囑摩訶迦葉諸大弟子外則付囑國王大臣令慧命不斷為得度因緣耳已上正宗分竟三流通分二初囑累流通五初展轉不息自今已後我諸弟子展轉行之則是如來法身常在而不滅也世尊囑累行之不絕則法身常存焉二歎世無常是故當知世皆無常會必有離勿懷憂惱世相如是遷流不住曰世形質可狀曰相應會示生寧無滅乎三以智爍幻當勤精進早求解脫以智慧明滅諸癡闇勤精進而智慧明癡闇滅則脫諸苦世實危脆無牢強者脆音翠有為虗假今昔皆然四示滅除惡我今得滅如除惡病此是應捨罪惡之物假名為身沒在老病生死大海佛身無為示同有為欲令眾生知身過患早悟法身也五結智人喜何有智者得除滅之如殺怨賊而不歡喜身為苦本眾苦所依眾生妄執為實不求出離大聖知生死皆幻示生死而化物二勸勉流通二初勤出無常汝等比丘常當一心勤求出道涅槃正道一切世間動不動法皆是敗壞不安之相欲界六天為動法色無色二界壽命劫數長久外道計以為常名不動法二誡止遺範汝等且止勿得復語時將欲過我欲滅度是我最後之所教誨應會時節寧容久留最後垂範付囑斯在化儀舒卷情謂杳亡方便門中那無指注法華會上金口親宣云為度眾生故方便現涅槃廣如壽量品其知此者則靈山一會儼然未散矣豈不韙歟若謂不然諒非吾道何也欲得不招無間業莫謗如來正法輪嘗攷傳燈世譜載大鑒下青原派曹洞宗第十三世守遂禪師所註四十二章經遺教經並了童禪師補較我慈聖宣文明肅皇太后刊板在金臺西直門裡迤南永祥寺適海鹽廣磐劉宰官諱祖鍚號念崧係雲棲蓮大師高足秉教念佛行敦孝義歷官光祿於崇禎四年辛未八月二十六日舟次東昌借一味禪院震宇法師藏本四十二章經註手寫攜歸迨崇禎九年丙子十月之八日借本邑沈廣冠居士藏本遺教經註仍以手寫與東昌所鈔得成合璧慶快示余捧讀註語直指彰顯如佛誡勑其正文對雲棲刻本字句多異同而義實勝因憶蓮大師䟦云二經實末法救病之良藥一是聖教流入震旦之始也今以其言近僧不持誦師不講演要知不專近有遠者人自不察也一是如來入滅最後要語喻世人所謂遺囑也子孫昧祖宗創始之來源是忘本也子孫背父母之遺囑是不孝也為僧者胡不思也并頌念崧壽逾六旬誠心手書且願重刻以廣其傳真善述蓮大師志意者也余亦願効一臂樂成之敢曰隨力裁因耶且紀諸善知識展轉勸發緣起以告見聞者幸毋忽時即崇禎丙子臘八日弟子通燈敬述
